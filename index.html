<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>信贷项目管理平台</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏦</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1a365d;
      --primary-light: #2c5282;
      --secondary: #4a5568;
      --accent: #38a169;
      --warning: #dd6b20;
      --danger: #e53e3e;
      --bg: #f7fafc;
      --card-bg: #ffffff;
      --sidebar-bg: #1a202c;
      --text: #2d3748;
      --text-light: #718096;
      --text-lighter: #a0aec0;
      --border: #e2e8f0;
      --shadow: 0 1px 3px rgba(0,0,0,0.12);
      --shadow-lg: 0 4px 12px rgba(0,0,0,0.15);
      --radius: 8px;
      --radius-sm: 4px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    .app {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 260px;
      background: var(--sidebar-bg);
      color: #e2e8f0;
      padding: 24px 0;
      position: fixed;
      height: 100vh;
      overflow-y: auto;
      transition: transform 0.3s ease;
      z-index: 100;
    }

    .sidebar-header {
      padding: 0 24px 32px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      margin-bottom: 24px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary-light), var(--accent));
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .logo-text {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .nav-menu {
      list-style: none;
    }

    .nav-item {
      margin-bottom: 4px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 24px;
      color: #a0aec0;
      text-decoration: none;
      transition: all 0.2s ease;
      border-left: 3px solid transparent;
      cursor: pointer;
    }

    .nav-link:hover {
      background: rgba(255,255,255,0.05);
      color: #e2e8f0;
    }

    .nav-link.active {
      background: rgba(56, 161, 105, 0.15);
      color: var(--accent);
      border-left-color: var(--accent);
    }

    .nav-icon {
      width: 20px;
      text-align: center;
      font-size: 16px;
    }

    .main {
      flex: 1;
      margin-left: 260px;
      min-height: 100vh;
    }

    .topbar {
      background: var(--card-bg);
      height: 64px;
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .page-title {
      font-size: 20px;
      font-weight: 600;
    }

    .search-box {
      position: relative;
    }

    .search-input {
      width: 280px;
      padding: 8px 16px 8px 40px;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input:focus {
      border-color: var(--primary);
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-lighter);
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-light);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--border);
    }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    .btn-danger:hover {
      background: #c53030;
    }

    .content {
      padding: 32px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .stat-icon {
      width: 48px;
      height: 48px;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-bottom: 16px;
    }

    .stat-icon.primary { background: rgba(26, 54, 93, 0.1); color: var(--primary); }
    .stat-icon.accent { background: rgba(56, 161, 105, 0.1); color: var(--accent); }
    .stat-icon.warning { background: rgba(221, 107, 32, 0.1); color: var(--warning); }
    .stat-icon.danger { background: rgba(229, 62, 62, 0.1); color: var(--danger); }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      font-family: "Source Code Pro", monospace;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 14px;
      color: var(--text-light);
    }

    .section {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 24px;
    }

    .section-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .section-title {
      font-size: 16px;
      font-weight: 600;
    }

    .section-body {
      padding: 24px;
    }

    .projects-table {
      width: 100%;
      border-collapse: collapse;
    }

    .projects-table th,
    .projects-table td {
      padding: 14px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    .projects-table th {
      background: var(--bg);
      font-weight: 500;
      font-size: 13px;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .projects-table tr:hover {
      background: rgba(26, 54, 93, 0.02);
    }

    .project-name {
      font-weight: 500;
      color: var(--primary);
      cursor: pointer;
    }

    .project-name:hover {
      text-decoration: underline;
    }

    .amount {
      font-family: "Source Code Pro", monospace;
      font-weight: 500;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }

    .status-badge.pending {
      background: rgba(221, 107, 32, 0.1);
      color: var(--warning);
    }

    .status-badge.processing {
      background: rgba(26, 54, 93, 0.1);
      color: var(--primary);
    }

    .status-badge.completed {
      background: rgba(56, 161, 105, 0.1);
      color: var(--accent);
    }

    .status-badge.rejected {
      background: rgba(229, 62, 62, 0.1);
      color: var(--danger);
    }

    .stage-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 500;
    }

    .stage-badge.pre {
      background: #ebf8ff;
      color: #2b6cb0;
    }

    .stage-badge.mid {
      background: #fef3c7;
      color: #b7791f;
    }

    .stage-badge.post {
      background: #f0fff4;
      color: #276749;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 8px;
    }

    .progress-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
      background: linear-gradient(90deg, var(--primary), var(--accent));
    }

    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--text);
    }

    .form-input,
    .form-select,
    .form-textarea {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-input:focus,
    .form-select:focus,
    .form-textarea:focus {
      border-color: var(--primary);
    }

    .form-textarea {
      min-height: 100px;
      resize: vertical;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      background: var(--card-bg);
      border-radius: 12px;
      width: 90%;
      max-width: 800px;
      max-height: 90vh;
      overflow-y: auto;
      transform: translateY(20px);
      transition: transform 0.3s;
    }

    .modal-overlay.active .modal {
      transform: translateY(0);
    }

    .modal-header {
      padding: 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 600;
    }

    .modal-close {
      width: 32px;
      height: 32px;
      border: none;
      background: var(--bg);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: var(--text-light);
      transition: all 0.2s;
    }

    .modal-close:hover {
      background: var(--border);
      color: var(--text);
    }

    .modal-body {
      padding: 24px;
    }

    .modal-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }

    .flow-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 0;
    }

    .flow-stage {
      flex: 1;
      text-align: center;
      position: relative;
    }

    .flow-stage:not(:last-child)::after {
      content: '';
      position: absolute;
      top: 20px;
      right: -50%;
      width: 100%;
      height: 3px;
      background: var(--border);
    }

    .flow-stage.active:not(:last-child)::after {
      background: var(--accent);
    }

    .flow-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
      font-size: 18px;
      position: relative;
      z-index: 1;
      color: var(--text-lighter);
    }

    .flow-stage.active .flow-icon {
      background: var(--accent);
      color: white;
    }

    .flow-stage.completed .flow-icon {
      background: var(--primary);
      color: white;
    }

    .flow-label {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .flow-status {
      font-size: 12px;
      color: var(--text-light);
    }

    .task-list {
      list-style: none;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .task-item:last-child {
      border-bottom: none;
    }

    .task-checkbox {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .task-checkbox.checked {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .task-content {
      flex: 1;
    }

    .task-title {
      font-size: 14px;
    }

    .task-title.checked {
      text-decoration: line-through;
      color: var(--text-lighter);
    }

    .task-meta {
      font-size: 12px;
      color: var(--text-light);
    }

    .empty-state {
      text-align: center;
      padding: 48px;
      color: var(--text-light);
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 24px;
    }

    .page-btn {
      width: 36px;
      height: 36px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all 0.2s;
    }

    .page-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .page-btn.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .mobile-menu-btn {
      display: none;
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
    }

    .detail-item {
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
    }

    .detail-label {
      font-size: 12px;
      color: var(--text-light);
      margin-bottom: 4px;
    }

    .detail-value {
      font-size: 14px;
      font-weight: 500;
    }

    .history-list {
      list-style: none;
    }

    .history-item {
      display: flex;
      gap: 16px;
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
    }

    .history-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .history-content {
      flex: 1;
    }

    .history-title {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .history-meta {
      font-size: 12px;
      color: var(--text-light);
    }

    @media (max-width: 1200px) {
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .main {
        margin-left: 0;
      }

      .mobile-menu-btn {
        display: block;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .detail-grid {
        grid-template-columns: 1fr;
      }

      .search-input {
        width: 200px;
      }
    }

    .fade-in {
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .notifications-badge {
      position: relative;
    }

    .notification-dot {
      position: absolute;
      top: -4px;
      right: -4px;
      width: 8px;
      height: 8px;
      background: var(--danger);
      border-radius: 50%;
      border: 2px solid var(--card-bg);
    }

    .filter-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .filter-select {
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      background: var(--card-bg);
      cursor: pointer;
      min-width: 140px;
    }

    .filter-select:focus {
      outline: none;
      border-color: var(--primary);
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-icon">🏦</div>
          <span class="logo-text">信贷管理平台</span>
        </div>
      </div>
      <ul class="nav-menu">
        <li class="nav-item">
          <a href="#" class="nav-link active" data-page="dashboard">
            <span class="nav-icon">📊</span>
            <span>仪表板</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="#" class="nav-link" data-page="projects" onclick="App.toggleSubMenu(event, 'projectSubMenu')">
            <span class="nav-icon">📁</span>
            <span>项目管理</span>
            <span style="margin-left:auto;font-size:12px;" id="projectSubMenuIcon">▼</span>
          </a>
          <ul class="sub-menu" id="projectSubMenu" style="display:none;list-style:none;padding-left:24px;">
            <li><a href="#" class="nav-link" style="padding:8px 24px;font-size:13px;" data-page="projects" onclick="App.showAllProjects()">📋 全部项目</a></li>
            <li><a href="#" class="nav-link" style="padding:8px 24px;font-size:13px;" data-page="projects" onclick="App.showStage('pre')">🔍 贷前调查</a></li>
            <li><a href="#" class="nav-link" style="padding:8px 24px;font-size:13px;" data-page="projects" onclick="App.showStage('mid')">📋 贷中审批</a></li>
            <li><a href="#" class="nav-link" style="padding:8px 24px;font-size:13px;" data-page="projects" onclick="App.showStage('post')">📊 贷后管理</a></li>
          </ul>
        </li>
        <li class="nav-item">
          <a href="#" class="nav-link" data-page="tasks">
            <span class="nav-icon">✅</span>
            <span>待办任务</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="#" class="nav-link" data-page="statistics">
            <span class="nav-icon">📈</span>
            <span>数据统计</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="#" class="nav-link" data-page="customers">
            <span class="nav-icon">👥</span>
            <span>客户管理</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="#" class="nav-link" data-page="deposits">
            <span class="nav-icon">💵</span>
            <span>存款管理</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="#" class="nav-link" data-page="settings">
            <span class="nav-icon">⚙️</span>
            <span>系统设置</span>
          </a>
        </li>
      </ul>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
          <h1 class="page-title" id="pageTitle">仪表板</h1>
        </div>
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" class="search-input" placeholder="搜索项目..." id="searchInput">
        </div>
        <div class="topbar-right">
          <button class="btn notifications-badge" id="notificationBtn">
            🔔
            <span class="notification-dot" id="notificationDot"></span>
          </button>
          <button class="btn btn-primary" id="newProjectBtn">
            <span>+</span>新建项目
          </button>
        </div>
      </header>

      <div class="content" id="content">
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="projectModal">
    <div class="modal" style="max-width: 900px;">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">新建项目</h2>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body">
        <form id="projectForm" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px;">
          <div class="form-group">
            <label class="form-label">项目编号</label>
            <input type="text" class="form-input" id="projectCode" readonly>
          </div>
          <div class="form-group">
            <label class="form-label">项目名称 *</label>
            <input type="text" class="form-input" id="projectName" required placeholder="请输入项目名称">
          </div>
          <div class="form-group" style="grid-column: span 2;">
            <label class="form-label">客户 *（可多选）</label>
            <input type="text" class="form-input" id="customerSearch" placeholder="搜索客户..." oninput="App.filterCustomers(this.value)" style="margin-bottom:8px;">
            <div id="customerList" style="max-height:150px;overflow-y:auto;border:1px solid var(--border);border-radius:4px;padding:8px;">
            </div>
          </div>
          <div class="form-group" style="grid-column: span 2;">
            <label class="form-label">已选客户</label>
            <div id="selectedCustomers" style="display:flex;flex-wrap:wrap;gap:8px;min-height:32px;padding:8px;background:var(--bg);border-radius:4px;"></div>
          </div>
          <div class="form-group" style="display:none;">
            <label class="form-label">客户名称</label>
            <input type="text" id="customerName">
          </div>
          <div class="form-group" style="display:none;">
            <label class="form-label">客户类型</label>
            <select class="form-select" id="customerType">
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">授信金额（元）*</label>
            <input type="number" class="form-input" id="creditAmount" required placeholder="请输入授信金额" min="0" step="10000">
          </div>
          <div class="form-group">
            <label class="form-label">授信期限</label>
            <select class="form-select" id="creditTerm">
              <option value="3">3个月</option>
              <option value="6">6个月</option>
              <option value="12" selected>12个月</option>
              <option value="24">24个月</option>
              <option value="36">36个月</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">利率（%）</label>
            <input type="number" class="form-input" id="interestRate" value="4.35" step="0.01" min="0" max="24">
          </div>
          <div class="form-group">
            <label class="form-label">担保方式</label>
            <select class="form-select" id="guaranteeType">
              <option value="credit">信用贷款</option>
              <option value="mortgage">抵押贷款</option>
              <option value="pledge">质押贷款</option>
              <option value="guarantee">担保贷款</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">开始时间</label>
            <input type="date" class="form-input" id="startDate">
          </div>
          <div class="form-group">
            <label class="form-label">结束时间</label>
            <input type="date" class="form-input" id="endDate">
          </div>
          <div class="form-group" style="grid-column: span 2;">
            <label class="form-label">备注说明</label>
            <textarea class="form-textarea" id="remark" placeholder="请输入备注说明"></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="cancelBtn">取消</button>
        <button class="btn btn-primary" id="saveBtn">保存项目</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="detailModal">
    <div class="modal" style="max-width: 900px;">
      <div class="modal-header">
        <h2 class="modal-title">项目详情</h2>
        <button class="modal-close" id="detailModalClose">✕</button>
      </div>
      <div class="modal-body" id="detailContent">
      </div>
    </div>
  </div>

  <script>
    const App = {
      data: {
        projects: [],
        customers: [],
        deposits: [],
        currentPage: 'dashboard',
        searchQuery: '',
        filterStatus: '',
        filterStage: ''
      },

      init() {
        if (!this.checkLogin()) {
          document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;"><h2>请先登录</h2><p>密码错误或已超时</p></div>';
          return;
        }
        this.loadData();
        this.bindEvents();
        this.render();
      },

      loadData() {
        const stored = localStorage.getItem('creditProjects');
        if (stored) {
          this.data.projects = JSON.parse(stored);
        } else {
          this.data.projects = this.generateSampleData();
          this.saveData();
        }
        const custStored = localStorage.getItem('creditCustomers');
        if (custStored) {
          this.data.customers = JSON.parse(custStored);
        } else {
          this.data.customers = this.generateSampleCustomers();
          this.saveData();
        }
        const depStored = localStorage.getItem('creditDeposits');
        if (depStored) {
          this.data.deposits = JSON.parse(depStored);
        } else {
          this.data.deposits = this.generateSampleDeposits();
          this.saveData();
        }
      },

      saveData() {
        localStorage.setItem('creditProjects', JSON.stringify(this.data.projects));
        localStorage.setItem('creditCustomers', JSON.stringify(this.data.customers));
        localStorage.setItem('creditDeposits', JSON.stringify(this.data.deposits));
      },

      generateSampleCustomers() {
        return [
          { id: 'C001', name: '北京创新科技有限公司', type: 'enterprise', contact: '张总', phone: '13800138000', address: '北京市朝阳区' },
          { id: 'C002', name: '上海国际贸易集团', type: 'enterprise', contact: '李经理', phone: '13800138001', address: '上海市浦东新区' },
          { id: 'C003', name: '深圳智能制造企业', type: 'enterprise', contact: '王总', phone: '13800138002', address: '深圳市南山区' },
          { id: 'C004', name: '广州物流运输公司', type: 'enterprise', contact: '刘总', phone: '13800138003', address: '广州市天河区' },
          { id: 'C005', name: '杭州电子商务', type: 'enterprise', contact: '陈总', phone: '13800138004', address: '杭州市滨江区' },
          { id: 'C006', name: '张三', type: 'personal', phone: '13900139000' },
          { id: 'C007', name: '李四', type: 'personal', phone: '13900139001' }
        ];
      },

      generateSampleDeposits() {
        return [
          { id: 'D001', customerId: 'C001', customerName: '北京创新科技有限公司', amount: 5000000, type: '定期', date: '2025-01-15', rate: 2.1 },
          { id: 'D002', customerId: 'C002', customerName: '上海国际贸易集团', amount: 8000000, type: '活期', date: '2025-02-20', rate: 0.35 },
          { id: 'D003', customerId: 'C003', customerName: '深圳智能制造企业', amount: 3000000, type: '定期', date: '2025-03-10', rate: 2.25 },
          { id: 'D004', customerId: 'C004', customerName: '广州物流运输公司', amount: 2000000, type: '活期', date: '2025-03-25', rate: 0.35 },
          { id: 'D005', customerId: 'C005', customerName: '杭州电子商务', amount: 6000000, type: '定期', date: '2025-04-05', rate: 2.15 },
          { id: 'D006', customerId: 'C001', customerName: '北京创新科技有限公司', amount: 1500000, type: '活期', date: '2025-04-18', rate: 0.35 },
          { id: 'D007', customerId: 'C006', customerName: '张三', amount: 500000, type: '定期', date: '2025-05-01', rate: 2.3 },
          { id: 'D008', customerId: 'C007', customerName: '李四', amount: 300000, type: '活期', date: '2025-05-10', rate: 0.35 }
        ];
      },

      generateSampleData() {
        const customers = ['北京创新科技有限公司', '上海国际贸易集团', '深圳智能制造企业', '广州物流运输公司', '杭州电子商务', '成都软件开发', '武汉新能源科技', '南京制造业', '西安高新材料', '重庆文化旅游'];
        const statuses = ['pending', 'processing', 'completed', 'rejected'];
        const stages = ['pre', 'mid', 'post'];
        const projects = [];

        for (let i = 0; i < 15; i++) {
          const status = statuses[Math.floor(Math.random() * statuses.length)];
          const stage = status === 'completed' ? 'post' : stages[Math.floor(Math.random() * 3)];
          const amount = Math.floor(Math.random() * 10000000) + 500000;

          projects.push({
            id: `PRJ${String(2026001 + i).padStart(6, '0')}`,
            name: `授信项目-${customers[i % customers.length]}`,
            customerName: customers[i % customers.length],
            customerType: i % 2 === 0 ? 'enterprise' : 'personal',
            amount: amount,
            term: [6, 12, 24, 36][Math.floor(Math.random() * 4)],
            rate: (Math.random() * 3 + 3.5).toFixed(2),
            guaranteeType: ['credit', 'mortgage', 'pledge', 'guarantee'][Math.floor(Math.random() * 4)],
            status: status,
            stage: stage,
            stageProgress: { pre: 0, mid: 0, post: 0 },
            remark: '',
            createdAt: new Date(Date.now() - Math.random() * 90 * 24 * 60 * 60 * 1000).toISOString(),
            endDate: status === 'completed' ? new Date(Date.now() - Math.random() * 30 * 24 * 60 * 60 * 1000).toISOString() : null,
            tasks: this.generateTasks(status, stage)
          });

          const project = projects[projects.length - 1];
          if (stage === 'pre') project.stageProgress.pre = Math.floor(Math.random() * 100);
          else if (stage === 'mid') { project.stageProgress.pre = 100; project.stageProgress.mid = Math.floor(Math.random() * 100); }
          else { project.stageProgress.pre = 100; project.stageProgress.mid = 100; project.stageProgress.post = Math.floor(Math.random() * 100); }
        }

        return projects;
      },

      generateTasks(status, stage) {
        const preTasks = [
          { id: 1, title: '客户尽职调查', completed: false },
          { id: 2, title: '资料收集与核实', completed: false },
          { id: 3, title: '信用评估报告', completed: false },
          { id: 4, title: '实地考察', completed: false }
        ];
        const midTasks = [
          { id: 5, title: '初审评估', completed: false },
          { id: 6, title: '复审评估', completed: false },
          { id: 7, title: '终审决策', completed: false },
          { id: 8, title: '合同签订', completed: false }
        ];
        const postTasks = [
          { id: 9, title: '首次检查', completed: false },
          { id: 10, title: '定期检查', completed: false },
          { id: 11, title: '风险评估', completed: false },
          { id: 12, title: '到期处理', completed: false }
        ];

        let tasks = [];
        if (stage === 'pre' || status === 'pending') tasks = preTasks;
        else if (stage === 'mid' || status === 'processing') tasks = [...preTasks, ...midTasks];
        else tasks = [...preTasks, ...midTasks, ...postTasks];

        if (status === 'completed') {
          tasks.forEach(t => t.completed = true);
        }

        return tasks;
      },

      bindEvents() {
        document.getElementById('mobileMenuBtn').addEventListener('click', () => {
          document.getElementById('sidebar').classList.toggle('open');
        });

        document.querySelectorAll('.nav-link').forEach(link => {
          link.addEventListener('click', (e) => {
            e.preventDefault();
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            link.classList.add('active');
            this.data.currentPage = link.dataset.page;
            document.getElementById('sidebar').classList.remove('open');
            this.render();
          });
        });

        document.getElementById('newProjectBtn').addEventListener('click', () => {
          this.openProjectModal();
        });

        document.getElementById('modalClose').addEventListener('click', () => {
          this.closeModal('projectModal');
        });

        document.getElementById('detailModalClose').addEventListener('click', () => {
          this.closeModal('detailModal');
        });

        document.getElementById('cancelBtn').addEventListener('click', () => {
          this.closeModal('projectModal');
        });

        document.getElementById('saveBtn').addEventListener('click', () => {
          this.saveProject();
        });

        document.getElementById('searchInput').addEventListener('input', (e) => {
          this.data.searchQuery = e.target.value;
          this.render();
        });
      },

      openProjectModal(project = null) {
        const modal = document.getElementById('projectModal');
        const form = document.getElementById('projectForm');

        this.currentSelectedCustomers = project ? [...(project.customerIds || [])] : [];

        if (project) {
          document.getElementById('modalTitle').textContent = '编辑项目';
          document.getElementById('projectCode').value = project.id;
          document.getElementById('projectName').value = project.name;
          document.getElementById('creditAmount').value = project.amount;
          document.getElementById('creditTerm').value = project.term;
          document.getElementById('interestRate').value = project.rate;
          document.getElementById('guaranteeType').value = project.guaranteeType;
          document.getElementById('startDate').value = project.createdAt ? project.createdAt.split('T')[0] : '';
          document.getElementById('endDate').value = project.endDate ? project.endDate.split('T')[0] : '';
          document.getElementById('remark').value = project.remark || '';
          this.renderCustomerList();
          this.updateSelectedCustomers(this.currentSelectedCustomers);
        } else {
          document.getElementById('modalTitle').textContent = '新建项目';
          form.reset();
          document.getElementById('projectCode').value = this.generateProjectCode();
          this.currentCustomerFilter = '';
          this.renderCustomerList();
          this.updateSelectedCustomers([]);
        }

        modal.classList.add('active');
      },

      currentCustomerFilter: '',
      currentSelectedCustomers: [],

      renderCustomerList() {
        const container = document.getElementById('customerList');
        const filter = (this.currentCustomerFilter || '').toLowerCase();
        const filtered = this.data.customers.filter(c =>
          c.name.toLowerCase().includes(filter) || (c.contact || '').toLowerCase().includes(filter)
        );
        container.innerHTML = filtered.map(c => `
          <div style="display:flex;align-items:center;gap:8px;padding:6px;border-bottom:1px solid var(--border);cursor:pointer;" onclick="App.toggleCustomer('${c.id}')">
            <input type="checkbox" ${this.currentSelectedCustomers.includes(c.id) ? 'checked' : ''} onclick="event.stopPropagation();App.toggleCustomer('${c.id}')">
            <div>
              <div style="font-weight:500;">${c.name}</div>
              <div style="font-size:12px;color:var(--text-light);">${c.type === 'enterprise' ? '企业' : '个人'} · ${c.phone || ''}</div>
            </div>
          </div>
        `).join('');
      },

      filterCustomers(value) {
        this.currentCustomerFilter = value;
        this.renderCustomerList();
      },

      toggleCustomer(customerId) {
        const idx = this.currentSelectedCustomers.indexOf(customerId);
        if (idx >= 0) {
          this.currentSelectedCustomers.splice(idx, 1);
        } else {
          this.currentSelectedCustomers.push(customerId);
        }
        this.renderCustomerList();
        this.updateSelectedCustomers(this.currentSelectedCustomers);
      },

      updateSelectedCustomers(selectedIds) {
        const container = document.getElementById('selectedCustomers');
        const customers = this.data.customers.filter(c => selectedIds.includes(c.id));
        container.innerHTML = customers.map(c => `
          <span style="display:inline-flex;align-items:center;gap:4px;padding:4px 8px;background:var(--primary);color:white;border-radius:4px;font-size:12px;">
            ${c.name}
            <span style="cursor:pointer;" onclick="App.removeCustomer('${c.id}')">✕</span>
          </span>
        `).join('') || '<span style="color:var(--text-lighter);font-size:12px;">请从上方选择客户</span>';
      },

      removeCustomer(customerId) {
        const idx = this.currentSelectedCustomers.indexOf(customerId);
        if (idx >= 0) {
          this.currentSelectedCustomers.splice(idx, 1);
          this.renderCustomerList();
          this.updateSelectedCustomers(this.currentSelectedCustomers);
        }
      },

      generateProjectCode() {
        const maxNum = this.data.projects.reduce((max, p) => {
          const num = parseInt(p.id.replace('PRJ', ''));
          return num > max ? num : max;
        }, 2026000);
        return `PRJ${String(maxNum + 1).padStart(6, '0')}`;
      },

      closeModal(modalId) {
        document.getElementById(modalId).classList.remove('active');
      },

      saveProject() {
        const projectCode = document.getElementById('projectCode').value;
        const projectName = document.getElementById('projectName').value;
        const customerIds = this.currentSelectedCustomers || [];
        const amount = parseFloat(document.getElementById('creditAmount').value);
        const term = parseInt(document.getElementById('creditTerm').value);
        const rate = document.getElementById('interestRate').value;
        const guaranteeType = document.getElementById('guaranteeType').value;
        const startDate = document.getElementById('startDate').value;
        const endDate = document.getElementById('endDate').value;
        const remark = document.getElementById('remark').value;

        if (!projectName || customerIds.length === 0 || !amount) {
          alert('请填写必填字段');
          return;
        }

        const customerNames = this.data.customers.filter(c => customerIds.includes(c.id)).map(c => c.name);
        const existingIndex = this.data.projects.findIndex(p => p.id === projectCode);

        const projectData = {
          id: projectCode,
          name: projectName,
          customerIds: customerIds,
          customerNames: customerNames,
          amount: amount,
          term: term,
          rate: rate,
          guaranteeType: guaranteeType,
          status: existingIndex >= 0 ? this.data.projects[existingIndex].status : 'pending',
          stage: existingIndex >= 0 ? this.data.projects[existingIndex].stage : 'pre',
          stageProgress: existingIndex >= 0 ? this.data.projects[existingIndex].stageProgress : { pre: 0, mid: 0, post: 0 },
          remark: remark,
          createdAt: startDate ? new Date(startDate).toISOString() : (existingIndex >= 0 ? this.data.projects[existingIndex].createdAt : new Date().toISOString()),
          endDate: endDate ? new Date(endDate).toISOString() : null,
          tasks: existingIndex >= 0 ? this.data.projects[existingIndex].tasks : this.generateTasks('pending', 'pre')
        };

        if (existingIndex >= 0) {
          this.data.projects[existingIndex] = projectData;
        } else {
          this.data.projects.unshift(projectData);
        }

        this.saveData();
        this.closeModal('projectModal');
        this.render();
      },

      getFilteredProjects() {
        let projects = this.data.projects;

        if (this.data.searchQuery) {
          const query = this.data.searchQuery.toLowerCase();
          projects = projects.filter(p =>
            p.name.toLowerCase().includes(query) ||
            (p.customerNames || []).some(n => n.toLowerCase().includes(query))
          );
        }

        if (this.data.filterStatus) {
          projects = projects.filter(p => p.status === this.data.filterStatus);
        }

        if (this.data.filterStage) {
          projects = projects.filter(p => p.stage === this.data.filterStage);
        }

        return projects;
      },

      getStats() {
        const projects = this.data.projects;
        const total = projects.length;
        const pending = projects.filter(p => p.status === 'pending').length;
        const processing = projects.filter(p => p.status === 'processing').length;
        const completed = projects.filter(p => p.status === 'completed').length;
        const rejected = projects.filter(p => p.status === 'rejected').length;
        const totalAmount = projects.reduce((sum, p) => sum + p.amount, 0);
        const approvedAmount = projects.filter(p => p.status === 'completed').reduce((sum, p) => sum + p.amount, 0);

        return {
          total,
          pending,
          processing,
          completed,
          rejected,
          totalAmount,
          approvedAmount,
          passRate: total > 0 ? ((completed / total) * 100).toFixed(1) : 0
        };
      },

      getStageStats() {
        const stages = ['pre', 'mid', 'post'];
        const stats = {};
        stages.forEach(s => {
          const projects = this.data.projects.filter(p => p.stage === s);
          stats[s] = {
            total: projects.length,
            pending: projects.filter(p => p.status === 'pending').length,
            processing: projects.filter(p => p.status === 'processing').length,
            completed: projects.filter(p => p.status === 'completed').length,
            rejected: projects.filter(p => p.status === 'rejected').length
          };
        });
        return stats;
      },

      clearStageFilter() {
        this.data.filterStage = '';
        this.render();
      },

      formatAmount(amount) {
        return new Intl.NumberFormat('zh-CN', { style: 'currency', currency: 'CNY', minimumFractionDigits: 0 }).format(amount);
      },

      formatDate(dateStr) {
        return new Date(dateStr).toLocaleDateString('zh-CN');
      },

      getStatusText(status) {
        const texts = { pending: '待处理', processing: '审批中', completed: '已完成', rejected: '已拒绝' };
        return texts[status] || status;
      },

      getStageText(stage) {
        const texts = { pre: '贷前调查', mid: '贷中审批', post: '贷后管理' };
        return texts[stage] || stage;
      },

      getCustomerTypeText(type) {
        return type === 'enterprise' ? '企业客户' : '个人客户';
      },

      getGuaranteeTypeText(type) {
        const texts = { credit: '信用贷款', mortgage: '抵押贷款', pledge: '质押贷款', guarantee: '担保贷款' };
        return texts[type] || type;
      },

      render() {
        const page = this.data.currentPage;
        const titles = { dashboard: '仪表板', projects: '项目管理', tasks: '待办任务', statistics: '数据统计', settings: '系统设置' };
        document.getElementById('pageTitle').textContent = titles[page] || '仪表板';

        const renderers = {
          dashboard: () => this.renderDashboard(),
          projects: () => this.renderProjects(),
          customers: () => this.renderCustomers(),
          tasks: () => this.renderTasks(),
          statistics: () => this.renderStatistics(),
          deposits: () => this.renderDeposits(),
          settings: () => this.renderSettings()
        };

        document.getElementById('content').innerHTML = (renderers[page] || renderers.dashboard)();
        this.bindPageEvents();
      },

      renderDashboard() {
        const stats = this.getStats();
        const recentProjects = this.getFilteredProjects().slice(0, 5);
        const pendingTasks = this.data.projects.flatMap(p => p.tasks.filter(t => !t.completed)).slice(0, 8);

        return `
          <div class="stats-grid fade-in">
            <div class="stat-card">
              <div class="stat-icon primary">📁</div>
              <div class="stat-value">${stats.total}</div>
              <div class="stat-label">总项目数</div>
            </div>
            <div class="stat-card">
              <div class="stat-icon warning">⏳</div>
              <div class="stat-value">${stats.pending + stats.processing}</div>
              <div class="stat-label">待处理项目</div>
            </div>
            <div class="stat-card">
              <div class="stat-icon accent">💰</div>
              <div class="stat-value">${(stats.totalAmount / 10000).toFixed(0)}万</div>
              <div class="stat-label">申请总额</div>
            </div>
            <div class="stat-card">
              <div class="stat-icon danger">✓</div>
              <div class="stat-value">${stats.passRate}%</div>
              <div class="stat-label">通过率</div>
            </div>
          </div>

          <div class="section fade-in">
            <div class="section-header">
              <h3 class="section-title">最近项目</h3>
              <button class="btn btn-secondary" onclick="App.navigateTo('projects')">查看全部</button>
            </div>
            <div class="section-body">
              <table class="projects-table">
                <thead>
                  <tr>
                    <th>项目编号</th>
                    <th>项目名称</th>
                    <th>客户名称</th>
                    <th>授信金额</th>
                    <th>当前阶段</th>
                    <th>状态</th>
                  </tr>
                </thead>
                <tbody>
                  ${recentProjects.map(p => `
                    <tr>
                      <td>${p.id}</td>
                      <td><span class="project-name" onclick="App.showProjectDetail('${p.id}')">${p.name}</span></td>

      renderStatistics() {
        const stats = this.getStats();
        const stageCounts = { pre: 0, mid: 0, post: 0 };
        this.data.projects.forEach(p => stageCounts[p.stage]++);

        const total = stats.total || 1;

        const statusData = [
          { key: 'pending', label: '待处理', count: stats.pending, color: '#dd6b20' },
          { key: 'processing', label: '审批中', count: stats.processing, color: '#1a365d' },
          { key: 'completed', label: '已完成', count: stats.completed, color: '#38a169' },
          { key: 'rejected', label: '已拒绝', count: stats.rejected, color: '#e53e3e' }
        ];

        const stageData = [
          { key: 'pre', label: '贷前调查', count: stageCounts.pre, color: '#2b6cb0' },
          { key: 'mid', label: '贷中审批', count: stageCounts.mid, color: '#b7791f' },
          { key: 'post', label: '贷后管理', count: stageCounts.post, color: '#276749' }
        ];

        const buildPie = (data) => {
          let gradient = '';
          let current = 0;
          data.forEach((item, i) => {
            if (item.count > 0) {
              const start = current;
              current += (item.count / total) * 360;
              const end = current;
              gradient += (gradient ? ', ' : '') + item.color + ' ' + start + 'deg ' + end + 'deg';
            }
          });
          return gradient || '#e2e8f0 0deg 360deg';
        };

        const statusGradient = buildPie(statusData);
        const stageGradient = buildPie(stageData);

        return `
          <div class="stats-grid fade-in">
            <div class="stat-card">
              <div class="stat-icon primary">📁</div>
              <div class="stat-value">${stats.total}</div>
              <div class="stat-label">总项目数</div>
            </div>
            <div class="stat-card">
              <div class="stat-icon accent">💰</div>
              <div class="stat-value">${this.formatAmount(stats.totalAmount)}</div>
              <div class="stat-label">申请总额</div>
            </div>
            <div class="stat-card">
              <div class="stat-icon primary">✓</div>
              <div class="stat-value">${this.formatAmount(stats.approvedAmount)}</div>
              <div class="stat-label">已放款总额</div>
            </div>
            <div class="stat-card">
              <div class="stat-icon danger">📊</div>
              <div class="stat-value">${stats.passRate}%</div>
              <div class="stat-label">项目通过率</div>
            </div>
          </div>

              <h3 style="margin-bottom: 16px; font-size: 16px;">项目状态分布（点击进入筛选）</h3>
              <div style="display:flex;justify-content:center;align-items:center;gap:32px;flex-wrap:wrap;">
                <div style="position:relative;">
                  <div style="width:150px;height:150px;border-radius:50%;background:conic-gradient(${statusGradient});cursor:pointer;" onclick="App.filterByStatus()"></div>
                </div>
                <div style="text-align:left;">
                  ${statusData.map(s => `<div style="display:flex;align-items:center;gap:8px;margin:8px 0;cursor:pointer;" onclick="App.filterProjectByStatus('${s.key}')"><span style="width:12px;height:12px;background:${s.color};border-radius:2px;"></span><span>${s.label}: ${s.count}</span></div>`).join('')}
                </div>
              </div>
            </div>

            <div class="card" style="text-align:center;">
              <h3 style="margin-bottom: 16px; font-size: 16px;">项目阶段分布（点击进入筛选）</h3>
              <div style="display:flex;justify-content:center;align-items:center;gap:32px;flex-wrap:wrap;">
                <div style="position:relative;">
                  <div style="width:150px;height:150px;border-radius:50%;background:conic-gradient(${stageGradient});cursor:pointer;" onclick="App.filterByStage()"></div>
                </div>
                <div style="text-align:left;">
                  ${stageData.map(s => `<div style="display:flex;align-items:center;gap:8px;margin:8px 0;cursor:pointer;" onclick="App.filterProjectByStage('${s.key}')"><span style="width:12px;height:12px;background:${s.color};border-radius:2px;"></span><span>${s.label}: ${s.count}</span></div>`).join('')}
                </div>
              </div>
            </div>
          </div>
        `;

        const customer = this.data.customers.find(c => c.id === id);

      saveCustomer(existingId) {
        const id = existingId || `C${String(this.data.customers.length + 1).padStart(3, '0')}`;
        const name = document.getElementById('custName').value;
        const type = document.getElementById('custType').value;
        const contact = document.getElementById('custContact').value;
        const phone = document.getElementById('custPhone').value;
        const address = document.getElementById('custAddress').value;

        if (!name) { alert('请输入客户名称'); return; }

        const customerData = { id, name, type, contact, phone, address };
        if (existingId) {
          const idx = this.data.customers.findIndex(c => c.id === existingId);
          this.data.customers[idx] = customerData;
        } else {
          this.data.customers.push(customerData);
        }

        this.saveData();
        this.closeModal('detailModal');
        this.render();
        alert('保存成功');
      },

            </div>
            <div class="flow-stage ${project.stageProgress.mid === 100 ? 'completed' : project.stage === 'mid' ? 'active' : ''}">
              <div class="flow-icon">📋</div>
              <div class="flow-label">���中审批</div>
              <div class="flow-status">${project.stageProgress.mid === 100 ? '已完成' : project.stageProgress.mid + '%'}</div>
            </div>
            <div class="flow-stage ${project.stageProgress.post === 100 ? 'completed' : project.stage === 'post' ? 'active' : ''}">
              <div class="flow-icon">📊</div>
              <div class="flow-label">贷后管理</div>
              <div class="flow-status">${project.stageProgress.post === 100 ? '已完成' : project.stageProgress.post + '%'}</div>
            </div>
          </div>

          <div class="detail-grid">
            <div>
              <h4 style="margin-bottom: 16px; font-size: 14px; color: var(--text-light);">基本信息</h4>
              <div class="detail-item">
                <div class="detail-label">项目编号</div>
                <div class="detail-value">${project.id}</div>
              </div>
              <div class="detail-item">
                <div class="detail-label">项目名称</div>
                <div class="detail-value">${project.name}</div>
              </div>
              <div class="detail-item">
                <div class="detail-label">客户</div>
                <div class="detail-value">${(project.customerNames || []).join(', ')}</div>
              </div>
              <div class="detail-item">
                <div class="detail-label">创建时间</div>
                <div class="detail-value">${this.formatDate(project.createdAt)}</div>
              </div>
            </div>
            <div>
              <h4 style="margin-bottom: 16px; font-size: 14px; color: var(--text-light);">授信信息</h4>
              <div class="detail-item">
                <div class="detail-label">授信金额</div>
                <div class="detail-value amount">${this.formatAmount(project.amount)}</div>
              </div>
              <div class="detail-item">
                <div class="detail-label">授信期限</div>
                <div class="detail-value">${project.term}个月</div>
              </div>
              <div class="detail-item">
                <div class="detail-label">利率</div>
                <div class="detail-value">${project.rate}%</div>
              </div>
              <div class="detail-item">
                <div class="detail-label">担保方式</div>
                <div class="detail-value">${this.getGuaranteeTypeText(project.guaranteeType)}</div>
              </div>
              <div class="detail-item">
                <div class="detail-label">状态</div>
                <div class="detail-value"><span class="status-badge ${project.status}">${this.getStatusText(project.status)}</span></div>
              </div>
            </div>
          </div>

          <div style="margin-top: 24px;">
            <h4 style="margin-bottom: 16px; font-size: 14px; color: var(--text-light);">任务清单</h4>
            <ul class="task-list">
              ${project.tasks.map(t => `
                <li class="task-item">
                  <div class="task-checkbox ${t.completed ? 'checked' : ''}" onclick="App.toggleTask('${t.id}', '${project.id}')">
                    ${t.completed ? '✓' : ''}
                  </div>
                  <div class="task-content">
                    <div class="task-title ${t.completed ? 'checked' : ''}">${t.title}</div>
                  </div>
                </li>
              `).join('')}
            </ul>
          </div>

          <div style="margin-top: 24px; display: flex; gap: 12px; justify-content: flex-end;">
            <button class="btn btn-secondary" onclick="App.editProject('${project.id}'); App.closeModal('detailModal');">编辑项目</button>
            ${project.status !== 'completed' ? `<button class="btn btn-primary" onclick="App.updateProjectStatus('${project.id}')">推进流程</button>` : ''}
          </div>
        `;

        document.getElementById('detailContent').innerHTML = detailContent;
        document.getElementById('detailModal').classList.add('active');
      },

      editProject(id) {
        const project = this.data.projects.find(p => p.id === id);
        if (project) this.openProjectModal(project);
      },

      toggleTask(taskId, projectId) {
        if (!projectId) {
          for (const p of this.data.projects) {
            const task = p.tasks.find(t => t.id == taskId);
            if (task) { projectId = p.id; break; }
          }
        }

        const project = this.data.projects.find(p => p.id === projectId);
        if (!project) return;

        const task = project.tasks.find(t => t.id == taskId);
        if (task) {
          task.completed = !task.completed;
          this.saveData();
          this.render();
        }
      },

      updateProjectStatus(id) {
        const project = this.data.projects.find(p => p.id === id);
        if (!project) return;

        if (project.stage === 'pre') {
          project.stage = 'mid';
          project.stageProgress.pre = 100;
          project.stageProgress.mid = 0;
        } else if (project.stage === 'mid') {
          project.stage = 'post';
          project.stageProgress.mid = 100;
          project.stageProgress.post = 0;
        } else if (project.stage === 'post') {
          project.stage = 'post';
          project.stageProgress.post = 100;
          project.status = 'completed';
        }

        project.tasks = this.generateTasks(project.status, project.stage);
        let taskIndex = 0;
        if (project.stage === 'pre') taskIndex = 0;
        else if (project.stage === 'mid') taskIndex = 4;
        else taskIndex = 8;

        for (let i = 0; i < taskIndex && i < project.tasks.length; i++) {
          project.tasks[i].completed = true;
        }

        this.saveData();
        this.showProjectDetail(id);
        document.getElementById('notificationDot').style.display = 'none';
      },

      navigateTo(page) {
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.querySelector(`[data-page="${page}"]`)?.classList.add('active');
        this.data.currentPage = page;
        this.render();
      },

      filterByStatus() {
        const filter = document.getElementById('statusFilter');
        this.data.filterStatus = filter.value;
        this.render();
      },

      filterByStage() {
        const filter = document.getElementById('stageFilter');
        this.data.filterStage = filter.value;
        this.render();
      },

      exportData() {
        const data = JSON.stringify(this.data.projects, null, 2);
        const blob = new Blob([data], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `credit-projects-${new Date().toISOString().split('T')[0]}.json`;
        a.click();
        URL.revokeObjectURL(url);
      },

      exportProjectsXlsx() {
        const projects = this.getFilteredProjects();
        const headers = ['项目编号', '项目名称', '客户', '授信金额', '授信期限', '利率', '担保方式', '当前阶段', '状态', '创建时间'];
        const escape = (v) => {
          const s = String(v);
          return s.includes(',') || s.includes('"') ? `"${s.replace(/"/g, '""')}"` : s;
        };
        const rows = [headers.map(escape).join(',')];
        projects.forEach(p => {
          const row = [
            escape(p.id),
            escape(p.name),
            escape((p.customerNames || []).join('; ')),
            escape(p.amount),
            escape(p.term + '个月'),
            escape(p.rate + '%'),
            escape(this.getGuaranteeTypeText(p.guaranteeType)),
            escape(this.getStageText(p.stage)),
            escape(this.getStatusText(p.status)),
            escape(this.formatDate(p.createdAt))
          ].join(',');
          rows.push(row);
        });
        const csv = rows.join('\n');
        const blob = new Blob(['\ufeff' + csv], { type: 'application/vnd.ms-excel' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `信贷项目-${new Date().toISOString().split('T')[0]}.xls`;
        a.click();
        URL.revokeObjectURL(url);
      },

      importData() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        input.onchange = async (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const text = await file.text();
          try {
            const data = JSON.parse(text);
            if (Array.isArray(data)) {
              this.data.projects = data;
              this.saveData();
              this.render();
              alert('导入成功');
            }
          } catch {
            alert('文件格式错误');
          }
        };
        input.click();
      },

      clearData() {
        if (confirm('确定要清空所有数据吗？此操作不可撤销。')) {
          this.data.projects = [];
          this.saveData();
          this.render();
        }
      },

      changePassword() {
        const current = document.getElementById('currentPassword').value;
        const newPass = document.getElementById('newPassword').value;
        const confirmPass = document.getElementById('confirmPassword').value;
        const storedPassword = localStorage.getItem('creditPassword') || '';

        if (storedPassword && !current) {
          alert('请输入当前密码');
          return;
        }

        if (storedPassword && this.hashPassword(current) !== storedPassword) {
          alert('当前密码错误');
          return;
        }

        if (!newPass || newPass.length < 6) {
          alert('新密码至少需要6位');
          return;
        }

        if (newPass !== confirmPass) {
          alert('两次输入的密码不一致');
          return;
        }

        localStorage.setItem('creditPassword', this.hashPassword(newPass));
        alert('密码修改成功');
        document.getElementById('currentPassword').value = '';
        document.getElementById('newPassword').value = '';
        document.getElementById('confirmPassword').value = '';
      },

      hashPassword(password) {
        let hash = 0;
        for (let i = 0; i < password.length; i++) {
          hash = ((hash << 5) - hash) + password.charCodeAt(i);
          hash |= 0;
        }
        return hash.toString(16);
      },

      checkLogin() {
        const password = localStorage.getItem('creditPassword');
        if (!password) return true;

        const input = prompt('请输入密码：');
        return this.hashPassword(input || '') === password;
      },

      toggleSubMenu(event, menuId) {
        event.preventDefault();
        const menu = document.getElementById(menuId);
        const icon = document.getElementById(menuId + 'Icon');
        if (menu.style.display === 'none') {
          menu.style.display = 'block';
          if (icon) icon.textContent = '▲';
        } else {
          menu.style.display = 'none';
          if (icon) icon.textContent = '▼';
        }
      },

      showStage(stage) {
        this.data.filterStage = stage;
        this.data.currentPage = 'projects';
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.querySelector('[data-page="projects"]')?.classList.add('active');
        this.render();
      },

      showAllProjects() {
        this.data.filterStage = '';
        this.data.currentPage = 'projects';
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.querySelector('[data-page="projects"]')?.classList.add('active');
        this.render();
      },

      toggleSection(sectionId) {
        const el = document.getElementById(sectionId);
        const icon = document.getElementById(sectionId + 'Icon');
        if (el.style.display === 'none') {
          el.style.display = 'block';
          if (icon) icon.textContent = '▲';
        } else {
          el.style.display = 'none';
          if (icon) icon.textContent = '▼';
        }
      },

      filterByStatus(status) {
        this.data.filterStatus = status || '';
        this.data.currentPage = 'projects';
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.querySelector('[data-page="projects"]')?.classList.add('active');
        this.render();
      },

      filterProjectByStatus(status) {
        this.filterByStatus(status);
      },

      filterProjectByStage(stage) {
        this.data.filterStage = stage || '';
        this.data.currentPage = 'projects';
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.querySelector('[data-page="projects"]')?.classList.add('active');
        this.render();
      },

      toggleTaskSection(sectionId) {
        const el = document.getElementById(sectionId);
        const icon = document.getElementById('taskIcon' + sectionId.replace('taskSection', ''));
        if (el.style.display === 'none') {
          el.style.display = 'block';
          if (icon) icon.textContent = '▼';
        } else {
          el.style.display = 'none';
          if (icon) icon.textContent = '▶';
        }
      },

      openDepositModal(deposit = null) {
        const isEdit = deposit != null;
        const content = document.getElementById('detailContent');
        document.getElementById('detailModal').classList.add('active');
        document.querySelector('#detailModal .modal-title').textContent = isEdit ? '编辑存款' : '新增存款';

        const customerOptions = this.data.customers.map(c =>
          `<option value="${c.id}" ${deposit && deposit.customerId === c.id ? 'selected' : ''}>${c.name}</option>`
        ).join('');

        document.getElementById('detailContent').innerHTML = `
          <form style="display:grid;grid-template-columns:repeat(2,1fr);gap:16px;">
            <div class="form-group">
              <label class="form-label">存款编号</label>
              <input type="text" class="form-input" id="depositId" value="${deposit ? deposit.id : ''}" ${isEdit ? 'readonly' : ''}>
            </div>
            <div class="form-group">
              <label class="form-label">客户 *</label>
              <select class="form-select" id="depositCustomer" required>
                ${customerOptions}
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">存款类型 *</label>
              <select class="form-select" id="depositType" required>
                <option value="定期" ${deposit && deposit.type === '定期' ? 'selected' : ''}>定期</option>
                <option value="活期" ${deposit && deposit.type === '活期' ? 'selected' : ''}>活期</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">存款金额 *</label>
              <input type="number" class="form-input" id="depositAmount" value="${deposit ? deposit.amount : ''}" required min="0">
            </div>
            <div class="form-group">
              <label class="form-label">利率（%）</label>
              <input type="number" class="form-input" id="depositRate" value="${deposit ? deposit.rate : ''}" step="0.01">
            </div>
            <div class="form-group">
              <label class="form-label">存款日期</label>
              <input type="date" class="form-input" id="depositDate" value="${deposit ? deposit.date : ''}">
            </div>
          </form>
          <div style="margin-top:24px;display:flex;justify-content:flex-end;gap:12px;">
            <button class="btn btn-secondary" onclick="App.closeModal('detailModal')">取消</button>
            <button class="btn btn-primary" onclick="App.saveDeposit(${isEdit ? `'${deposit.id}'` : 'null'})">保存</button>
          </div>
        `;
      },

      editDeposit(id) {
        const deposit = this.data.deposits.find(d => d.id === id);
        if (deposit) this.openDepositModal(deposit);
      },

      saveDeposit(existingId) {
        const id = existingId || `D${String(this.data.deposits.length + 1).padStart(3, '0')}`;
        const customerId = document.getElementById('depositCustomer').value;
        const customerName = this.data.customers.find(c => c.id === customerId)?.name || '';
        const type = document.getElementById('depositType').value;
        const amount = parseFloat(document.getElementById('depositAmount').value);
        const rate = parseFloat(document.getElementById('depositRate').value) || 0;
        const date = document.getElementById('depositDate').value || new Date().toISOString().split('T')[0];

        if (!customerId || !amount) { alert('请填写必填字段'); return; }

        const depositData = { id, customerId, customerName, type, amount, rate, date };
        if (existingId) {
          const idx = this.data.deposits.findIndex(d => d.id === existingId);
          this.data.deposits[idx] = depositData;
        } else {
          this.data.deposits.push(depositData);
        }

        this.saveData();
        this.closeModal('detailModal');
        this.render();
        alert('保存成功');
      },

      deleteDeposit(id) {
        if (confirm('确定要删除这条存款记录吗？')) {
          this.data.deposits = this.data.deposits.filter(d => d.id !== id);
          this.saveData();
          this.render();
        }
      },

      renderDurationBar(project) {
        const start = new Date(project.createdAt).getTime();
        const end = project.endDate ? new Date(project.endDate).getTime() : Date.now();
        const days = Math.floor((end - start) / (1000 * 60 * 60 * 24));
        const maxDays = 90;
        const percent = Math.min((days / maxDays) * 100, 100);
        const r = Math.min(255, Math.floor((percent / 100) * 255));
        const g = Math.min(255, Math.floor((1 - percent / 100) * 200 + 50));
        const color = `rgb(${r}, ${g}, 80)`;
        const color2 = project.endDate ? '#38a169' : color;
        return `
          <div style="display:flex;align-items:center;gap:8px;">
            <div style="flex:1;height:16px;background:var(--border);border-radius:8px;overflow:hidden;max-width:80px;">
              <div style="width:${percent}%;height:100%;background:${color2};border-radius:8px;transition:width 0.3s;"></div>
            </div>
            <span style="font-size:12px;white-space:nowrap;">${days}天</span>
          </div>
        `;
      },

      bindPageEvents() {}
    };

    document.addEventListener('DOMContentLoaded', () => App.init());
  </script>
</body>
</html>
